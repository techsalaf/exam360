name: Deploy to Namecheap cPanel via HTTP Webhook

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Trigger Deployment Webhook
        run: |
          echo "🚀 Triggering deployment on Namecheap server..."
          
          # Check if webhook URL exists
          if [ -z "${{ secrets.NAMECHEAP_DEPLOY_WEBHOOK_URL }}" ]; then
            echo "❌ ERROR: NAMECHEAP_DEPLOY_WEBHOOK_URL secret not found!"
            echo "Create a deployment script on your server and add the URL as a secret"
            exit 1
          fi
          
          # Call the webhook
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST \
            "${{ secrets.NAMECHEAP_DEPLOY_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d "{\"branch\":\"main\",\"timestamp\":\"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"}")
          
          echo "📡 Webhook Response: HTTP $RESPONSE"
          
          if [ "$RESPONSE" = "200" ]; then
            echo "✅ Deployment triggered successfully!"
          else
            echo "❌ Webhook returned HTTP $RESPONSE (expected 200)"
            exit 1
          fi

  notify:
    runs-on: ubuntu-latest
    needs: deploy
    if: always()
    
    steps:
      - name: Deployment Status
        run: |
          if [ "${{ needs.deploy.result }}" = "success" ]; then
            echo "✅ Deployment webhook to cbt.my360school.com triggered successfully!"
          else
            echo "❌ Deployment webhook failed!"
            exit 1
          fi
