name: Deploy to Namecheap cPanel

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup SSH
        run: |
          set -x
          mkdir -p ~/.ssh
          
          # Check if secret exists and has content
          if [ -z "${{ secrets.NAMECHEAP_SSH_KEY }}" ]; then
            echo "❌ ERROR: NAMECHEAP_SSH_KEY secret not found or empty!"
            echo "Add it at: https://github.com/techsalaf/exam360/settings/secrets/actions"
            exit 1
          fi
          
          echo "✅ Secret found, writing SSH key..."
          echo "${{ secrets.NAMECHEAP_SSH_KEY }}" > ~/.ssh/id_rsa
          
          # Verify key was written
          if [ ! -f ~/.ssh/id_rsa ]; then
            echo "❌ ERROR: SSH key file not created!"
            exit 1
          fi
          
          # Verify key is not empty
          if [ ! -s ~/.ssh/id_rsa ]; then
            echo "❌ ERROR: SSH key file is empty!"
            exit 1
          fi
          
          echo "✅ SSH key written successfully"
          chmod 600 ~/.ssh/id_rsa
          
          echo "✅ Scanning host key for cbt.my360school.com..."
          ssh-keyscan -H cbt.my360school.com >> ~/.ssh/known_hosts 2>&1 || {
            echo "⚠️ Warning: ssh-keyscan failed, but continuing..."
          }
          
          echo "✅ SSH setup complete"

      - name: Deploy via SSH
        run: |
          set -x
          echo "🔍 Checking SSH connection..."
          ssh -v pnzjqabw@cbt.my360school.com "echo '✅ SSH connection successful'"
          
          echo "🚀 Starting deployment..."
          ssh pnzjqabw@cbt.my360school.com "
            set -e
            
            echo '📦 Navigating to project directory...'
            cd /home/pnzjqabw/cbt
            
            echo '🔄 Pulling latest changes from GitHub...'
            git fetch origin main
            git reset --hard origin/main
            
            echo '📥 Installing PHP dependencies...'
            composer install --no-dev --optimize-autoloader
            
            echo '📦 Installing Node dependencies...'
            npm ci
            
            echo '🏗️  Building frontend assets...'
            npm run build
            
            echo '🔑 Setting application permissions...'
            chmod -R 775 storage bootstrap/cache
            
            echo '🗂️  Running database migrations...'
            php artisan migrate --force
            
            echo '🧹 Clearing application cache...'
            php artisan cache:clear
            php artisan config:clear
            php artisan view:clear
            php artisan route:clear
            
            echo '⚡ Optimizing application...'
            php artisan optimize
            
            echo '✅ Deployment completed successfully!'
          "

  notify:
    runs-on: ubuntu-latest
    needs: deploy
    if: always()
    
    steps:
      - name: Deployment Status
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            echo "✅ Deployment to cbt.my360school.com succeeded!"
          else
            echo "❌ Deployment to cbt.my360school.com failed!"
            exit 1
          fi
