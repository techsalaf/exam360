name: Deploy to Namecheap cPanel via HTTP Webhook

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Trigger Deployment Webhook
        run: |
          echo "🚀 Triggering deployment on Namecheap server..."

          # Check if webhook URL exists
          if [ -z "${{ secrets.NAMECHEAP_DEPLOY_WEBHOOK_URL }}" ]; then
            echo "❌ ERROR: NAMECHEAP_DEPLOY_WEBHOOK_URL secret not found!"
            echo "Setup: https://cbt.my360school.com/deploy.php"
            exit 1
          fi

          # Call the webhook and capture BOTH the response body and the HTTP code.
          # (Previously the body was sent to /dev/null, so a 200 status code
          # looked like success even when deploy.php's own JSON reported a failure.)
          HTTP_CODE=$(curl -s -o response.json -w "%{http_code}" \
            -X GET \
            "${{ secrets.NAMECHEAP_DEPLOY_WEBHOOK_URL }}" \
            -H "User-Agent: GitHub-Actions")

          echo "📡 HTTP Status: $HTTP_CODE"
          echo "📄 Response body from deploy.php:"
          cat response.json || echo "(no response body received)"
          echo ""

          # Pull the "status" field out of the JSON body deploy.php returns.
          DEPLOY_STATUS=$(grep -o '"status"[[:space:]]*:[[:space:]]*"[a-z]*"' response.json | grep -o '"[a-z]*"$' | tr -d '"')

          if [ "$HTTP_CODE" = "200" ] && [ "$DEPLOY_STATUS" = "success" ]; then
            echo "✅ Deployment triggered and confirmed successful!"
          else
            echo "❌ Deployment did not succeed."
            echo "HTTP code: $HTTP_CODE, reported status: $DEPLOY_STATUS"
            echo "Check the response body above for the specific error message."
            exit 1
          fi

  notify:
    runs-on: ubuntu-latest
    needs: deploy
    if: always()

    steps:
      - name: Deployment Status
        run: |
          if [ "${{ needs.deploy.result }}" = "success" ]; then
            echo "✅ Deployment webhook to cbt.my360school.com triggered successfully!"
          else
            echo "❌ Deployment webhook failed!"
            exit 1
          fi